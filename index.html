<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExitTime</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container" id="mainDashboard">
    
    <div class="dashboard-header">
      <div class="header-box" id="calendarBox">📅 شمسی...</div>
      <div class="header-box" id="gregorianTimeBox">🌐 میلادی...</div>
      <div class="header-box" id="weatherBox">☀️ وضعیت هوا...</div>
    </div>

    <h2>محاسبه‌گر تایم خروج از شرکت</h2>

    <div class="input-group">
      <label class="input-label">تایم ورودتو وارد کن خوشگلم</label>
      <div class="input-wrapper">
        <input type="number" id="hourInput" placeholder="ساعت" min="0" max="23" />
        <span class="time-separator">:</span>
        <input type="number" id="minuteInput" placeholder="دقیقه" min="0" max="59" />
      </div>
    </div>

    <button class="btn-calc" onclick="calculateTime()">محاسبه زمان خروج</button>

    <div id="errorBox"></div>

    <div id="result">
      <span class="result-title">ساعتی که می‌تونی بری:</span>
      <span id="calculatedTime"></span>
      <div id="countdownBox" class="countdown-container"></div>
    </div>

    <div id="easterEggZone" class="hidden-zone">
      <h3>The Gossiper 🕵️‍♂️</h3>
      <div id="ticTacToeGame" class="game-container">
        <div class="ttt-board" id="tttBoard">
          <div class="cell" data-index="0"></div>
          <div class="cell" data-index="1"></div>
          <div class="cell" data-index="2"></div>
          <div class="cell" data-index="3"></div>
          <div class="cell" data-index="4"></div>
          <div class="cell" data-index="5"></div>
          <div class="cell" data-index="6"></div>
          <div class="cell" data-index="7"></div>
          <div class="cell" data-index="8"></div>
        </div>
        <p id="tttStatus"></p>
        <button onclick="resetTicTacToe()" class="btn-reset">بازنشانی صفحه بازی</button>
      </div>
    </div>

    <div class="powered-by" onclick="triggerEasterEgg()"><strong>The Gossiper 🕵️‍♂️</strong></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
